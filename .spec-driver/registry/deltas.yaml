          description: Implement Supervisor
        - id: '4.2'
          description: Implement transition_from_handoff
        - id: '4.3'
          description: Implement public API functions
        - id: '4.4'
          description: Implement reconciliation
        - id: '4.5'
          description: Wire up autobahn.api module
        - id: '4.6'
          description: Verify all tests pass
        risks: []
      - schema: supekku.phase.overview
        version: 1
        phase: IP-001.PHASE-05
        plan: IP-001
        delta: DE-001
        objective: 'End-to-end integration test proving the full session lifecycle
          with a real subprocess: load_context -> transition_from_handoff -> spawn
          -> observe -> terminate -> reconcile. Uses Claude Code adapter + subprocess
          backend against fixture workflow directory.'
        entrance_criteria:
